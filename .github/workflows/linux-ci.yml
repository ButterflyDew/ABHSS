name: Linux build and exactness gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gcc-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Configure, build, and run repository-local gates
        run: make release JOBS=2
